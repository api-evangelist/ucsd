reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      UCSD has a real but largely gated developer footprint. The ITS Developer
      Guide and Web API Portal resolve live, but the documented Web APIs require
      a UCSD Single Sign-On account and are not open to external developers.
      TritonAI is a live LLM gateway restricted to approved campus users with
      issued API keys. The Library Digital Collections is publicly browsable but
      no formally documented public REST/IIIF/OAI-PMH API surface was confirmed.
      Official GitHub organizations (UCSD, ucsdlib) are active. No open,
      self-service, externally documented API was found; nothing was fabricated.
